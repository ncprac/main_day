# Digital Ocean App Platform spec
# Deploy with: doctl apps create --spec .do/app.yaml
# Update with: doctl apps update $DO_APP_ID --spec .do/app.yaml
#
# Replace <YOUR_GITHUB_USERNAME> with your actual GitHub username before deploying.

name: hello-world
region: nyc

services:
  - name: backend
    image:
      registry_type: GHCR
      registry: ghcr.io/<YOUR_GITHUB_USERNAME>/hello-backend
      tag: latest
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    routes:
      - path: /api

  - name: frontend
    image:
      registry_type: GHCR
      registry: ghcr.io/<YOUR_GITHUB_USERNAME>/hello-frontend
      tag: latest
    http_port: 80
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    routes:
      - path: /
