<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Hello World App <span class="badge">v2</span></h1>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('customer')">Customer</button>
      <button class="tab" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="customer" class="panel">
      <h2>Customer Portal</h2>
      <button onclick="greet('customer')">Say Hello</button>
      <div id="customer-response" class="response hidden"></div>
    </div>

    <div id="admin" class="panel hidden">
      <h2>Admin Panel</h2>
      <button onclick="greet('admin')">Say Hello</button>
      <div id="admin-response" class="response hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
